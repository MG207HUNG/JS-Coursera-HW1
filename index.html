<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photo Gallery</title>
	<link rel="stylesheet" href="css/gallery.css">
	<script src="js/gallery.js"></script>
</head>
<body onload="addTabIndex()">

	<h1>My Interactive Photo Gallery</h1>

	<div id="image">
		Hover over an image below to display here.
	</div>

	<img class="preview"
		alt="Thumbnail of Hate That I Made You Love Me - Ariana Grande"
		src="images/makeyouhateme.jpg"
		onmouseover="upDate(this)" onmouseout="unDo()"
		onfocus="upDate(this)" onblur="unDo()">

	<img class="preview"
		alt="Thumbnail of Die For You - The Weeknd & Ariana Grande"
		src="images/dieforyou.jpg"
		onmouseover="upDate(this)" onmouseout="unDo()"
		onfocus="upDate(this)" onblur="unDo()">

	<img class="preview"
		alt="Thumbnail of Stay - The Kid LAROI & Justin Bieber"
		src="images/stay.jpg"
		onmouseover="upDate(this)" onmouseout="unDo()"
		onfocus="upDate(this)" onblur="unDo()">

	<img class="preview"
		alt="Thumbnail of Die With A Smile - Lady Gaga & Bruno Mars"
		src="images/diewithasmile.jpg"
		onmouseover="upDate(this)" onmouseout="unDo()"
		onfocus="upDate(this)" onblur="unDo()">

	<img class="preview"
		alt="Thumbnail of Chỉ Hai Chúng Ta - Trại Mosaic- Space Jam 5"
		src="images/chihaichungta.jpg"
		onmouseover="upDate(this)" onmouseout="unDo()"
		onfocus="upDate(this)" onblur="unDo()">

	<img class="preview"
		alt="Thumbnail of Lầu Lâm Ba - THE FLOB"
		src="images/laulamba.jpg"
		onmouseover="upDate(this)" onmouseout="unDo()"
		onfocus="upDate(this)" onblur="unDo()">

</body>
</html>
